<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synthetic GP passive drift</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #172033;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #f8fafc;
    }
    .app {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 18px;
      align-items: start;
    }
    h1 {
      grid-column: 1 / -1;
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }
    canvas {
      width: 100%;
      aspect-ratio: 1.22;
      background: #eef3f8;
      border: 1px solid #cbd5e1;
      display: block;
    }
    .panel {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      padding: 14px;
    }
    .group {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      font-weight: 650;
      color: #334155;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #b9c3d0;
      padding: 7px 8px;
      font: inherit;
      border-radius: 3px;
      background: #fff;
    }
    input[type="range"] {
      padding: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      border: 1px solid #0f766e;
      background: #0f766e;
      color: white;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      border-radius: 3px;
      cursor: pointer;
    }
    button.secondary {
      border-color: #94a3b8;
      background: #f8fafc;
      color: #172033;
    }
    .status {
      font-size: 12px;
      line-height: 1.45;
      color: #475569;
      border-top: 1px solid #e2e8f0;
      padding-top: 10px;
      white-space: pre-line;
    }
    @media (max-width: 860px) {
      body { padding: 12px; }
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">

    <canvas id="field" width="960" height="760"></canvas>

      <div class="group">

          <button id="playBtn">Resume</button>
          <button id="pauseBtn" class="secondary">Pause</button>
        </div>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>
      <div id="status" class="status"></div>
    </aside>
  </main>

          const [u, v] = sampleAt(x, y, pos.z);
          const mag = Math.hypot(u, v);
          maxMag = Math.max(maxMag, mag);
          samples.push([x, y, u, v]);
        }
      }
      const arrowScale = maxMag > 1e-9 ? 0.85 * stride / maxMag : 1;
      ctx.strokeStyle = "rgba(37,99,235,0.62)";
      ctx.fillStyle = "rgba(37,99,235,0.62)";
      ctx.lineWidth = 1.5;
      for (const [x, y, u, v] of samples) drawArrow(x, y, u, v, arrowScale);

      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 4;
      ctx.beginPath();
      path.forEach((p, idx) => {
        const x = toCanvasX(p.x);
        const y = toCanvasY(p.y);
        if (idx === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = "#f59e0b";
      ctx.beginPath();
      ctx.arc(toCanvasX(start.x), toCanvasY(start.y), 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#dc2626";
      ctx.beginPath();
      const bx = toCanvasX(pos.x);
      const by = toCanvasY(pos.y);
      ctx.moveTo(bx, by - 9);
      ctx.lineTo(bx + 9, by);
      ctx.lineTo(bx, by + 9);
      ctx.lineTo(bx - 9, by);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#334155";
      ctx.font = "13px Inter, sans-serif";
      ctx.fillText("x", canvas.width / 2, canvas.height - 16);
      ctx.save();
      ctx.translate(18, canvas.height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("y", 0, 0);
      ctx.restore();

      statusEl.textContent = `step ${step}\nx=${pos.x.toFixed(2)}  y=${pos.y.toFixed(2)}  z=${pos.z.toFixed(2)}\nspeed=${speedInput.value} steps/sec`;
    }

    function simStep() {
      const [uRaw, vRaw] = sampleAt(pos.x, pos.y, pos.z);
      const u = clamp(uRaw, -data.maxDisplacement, data.maxDisplacement);
      const v = clamp(vRaw, -data.maxDisplacement, data.maxDisplacement);
      let nxp = pos.x + u;
      let nyp = pos.y + v;
      if (data.boundary === "periodic") {
        nxp = ((nxp - 1) % nx + nx) % nx + 1;
        nyp = ((nyp - 1) % ny + ny) % ny + 1;
      } else {
        nxp = clamp(nxp, 1, nx);
        nyp = clamp(nyp, 1, ny);
      }
      pos = { x: nxp, y: nyp, z: pos.z };
      path.push({ ...pos });
      step += 1;
      draw();
    }

    function setTimer() {
      if (timer) clearInterval(timer);
      if (running) timer = setInterval(simStep, 1000 / Number(speedInput.value));
    }

    function deploy() {
      running = false;
      setTimer();
      pos = {
        x: clamp(Number(xInput.value), 1, nx),
        y: clamp(Number(yInput.value), 1, ny),
        z: clamp(Number(zInput.value), 1, nz)
      };
      start = { ...pos };
      path = [{ ...pos }];
      step = 0;
      draw();
    }

    canvas.addEventListener("click", (event) => {
      const rect = canvas.getBoundingClientRect();
      const p = fromCanvas(
        (event.clientX - rect.left) * canvas.width / rect.width,
        (event.clientY - rect.top) * canvas.height / rect.height
      );
      xInput.value = p.x.toFixed(1);
      yInput.value = p.y.toFixed(1);
      deploy();
    });

    document.getElementById("deployBtn").addEventListener("click", deploy);
    document.getElementById("playBtn").addEventListener("click", () => { running = true; setTimer(); });
    document.getElementById("pauseBtn").addEventListener("click", () => { running = false; setTimer(); });
    document.getElementById("resetBtn").addEventListener("click", deploy);
    speedInput.addEventListener("input", setTimer);
    zInput.addEventListener("change", deploy);
    draw();
  </script>
</body>
</html>
