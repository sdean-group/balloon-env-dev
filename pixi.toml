[project]
channels = ["conda-forge"]
name = "ambient-dynamics"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
register-kernel = "python -m ipykernel install --user --name=ambient-$PIXI_ENVIRONMENT_NAME --display-name=\"ambient-$PIXI_ENVIRONMENT_NAME\""
test = "pytest tests/ -v"
jupytext-sync = { cmd = "grep -rl 'formats: ipynb,py:percent' --include='*.py' . | xargs jupytext --sync", description = "Sync all jupytext-paired .py/.ipynb files" }

[dependencies]
python = ">=3.11"
numpy = ">=2.0.0"
pyyaml = ">=6.0"
pandas = ">=2.0.0"
scikit-learn = ">=1.5.0"
cdsapi = ">=0.7.7,<0.8"
xarray = ">=2026.4.0,<2027"
netcdf4 = ">=1.7.4,<2"

[feature.dev.dependencies]
pytest = ">=8.0.0"
jupyter = ">=1.1.0"
ipykernel = ">=6.0.0"

[feature.viz.dependencies]
matplotlib = ">=3.7.0"
plotly = ">=5.0.0"
imageio = ">=2.0.0"
imageio-ffmpeg = ">=0.6.0"
python-kaleido = "==0.2.1"
jupytext = ">=1.19.1,<2"

[feature.gp.pypi-dependencies]
gpjax = "==0.13.6"
flax = ">=0.12.2"
jax = ">=0.5.0"
jaxlib = ">=0.5.0"
optax = ">0.2.1"
numpyro = ">=0.15.0"
jaxtyping = ">0.2.10"
beartype = ">0.16.1"
tqdm = ">4.66.2"

[feature.rl.dependencies]
gymnasium = ">=1.0.0"

[environments]
default = ["dev", "viz", "gp", "rl"]
dev = ["dev"]
viz = ["viz"]
gp = ["gp"]
rl = ["rl"]
